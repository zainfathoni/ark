<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Alpha Trion avatar">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="beard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  <circle cx="110" cy="100" r="80" fill="#ffffff" opacity="0.06"/>
  <circle cx="420" cy="410" r="90" fill="#000000" opacity="0.06"/>
  <path d="M0 380 C140 340, 260 420, 512 340 L512 512 L0 512 Z" fill="#ffffff" opacity="0.06"/>
  <g filter="url(#softShadow)">
    <!-- Hood/head covering -->
    <path d="M180 140 C180 100, 332 100, 332 140 L348 200 L164 200 Z" fill="url(#robe)"/>
    <!-- Face -->
    <rect x="190" y="170" width="132" height="100" rx="20" fill="#0f172a" opacity="0.85"/>
    <!-- Eyes — wise, narrow -->
    <rect x="210" y="200" width="36" height="10" rx="5" fill="#f59e0b"/>
    <rect x="266" y="200" width="36" height="10" rx="5" fill="#f59e0b"/>
    <!-- Beard -->
    <path d="M190 260 C190 260, 210 320, 256 340 C302 320, 322 260, 322 260 Z" fill="url(#beard)"/>
    <!-- Robe body -->
    <path d="M164 200 L148 370 L364 370 L348 200 Z" fill="url(#robe)"/>
    <!-- Robe center line -->
    <rect x="252" y="200" width="8" height="170" rx="4" fill="#047857" opacity="0.6"/>
    <!-- Tasbih beads (prayer beads) -->
    <g transform="translate(350, 280)">
      <circle cx="0" cy="0" r="7" fill="#f59e0b" opacity="0.9"/>
      <circle cx="0" cy="18" r="7" fill="#f59e0b" opacity="0.9"/>
      <circle cx="0" cy="36" r="7" fill="#f59e0b" opacity="0.9"/>
      <circle cx="0" cy="54" r="7" fill="#f59e0b" opacity="0.9"/>
      <circle cx="-14" cy="62" r="7" fill="#f59e0b" opacity="0.9"/>
      <circle cx="-28" cy="56" r="7" fill="#f59e0b" opacity="0.9"/>
    </g>
    <!-- Book/kitab -->
    <g transform="translate(140, 290)">
      <rect x="0" y="0" width="52" height="68" rx="4" fill="#1e3a5f"/>
      <rect x="4" y="4" width="44" height="60" rx="2" fill="#1e293b"/>
      <rect x="12" y="16" width="28" height="3" rx="1.5" fill="#f59e0b" opacity="0.7"/>
      <rect x="12" y="24" width="22" height="3" rx="1.5" fill="#f59e0b" opacity="0.5"/>
      <rect x="12" y="32" width="26" height="3" rx="1.5" fill="#f59e0b" opacity="0.5"/>
    </g>
  </g>
  <!-- Emoji badge -->
  <g transform="translate(362,362)">
    <circle cx="56" cy="56" r="56" fill="#0b1220" opacity="0.78"/>
    <circle cx="56" cy="56" r="48" fill="#10b981"/>
    <text x="56" y="72" font-family="system-ui, sans-serif" font-size="48" text-anchor="middle" fill="#ffffff">📿</text>
  </g>
  <text x="256" y="430" font-family="Avenir Next, Segoe UI, sans-serif" font-size="28" text-anchor="middle" fill="#f8fafc" font-weight="700">Alpha Trion</text>
  <text x="256" y="458" font-family="Avenir Next, Segoe UI, sans-serif" font-size="15" text-anchor="middle" fill="#e2e8f0" opacity="0.92">Islamic Knowledge</text>
</svg>
