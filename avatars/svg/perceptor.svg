<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Perceptor avatar">
  <defs>
    <!-- Background gradient: diagonal top-left → bottom-right -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0a1e"/>
    </linearGradient>
    <!-- Armor (head body) gradient: top → bottom -->
    <linearGradient id="armor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <!-- Soft drop shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- === CARD BACKGROUND === -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  <!-- Decorative glow circles (same positions as all other bots) -->
  <circle cx="122" cy="110" r="84" fill="#ffffff" opacity="0.08"/>
  <circle cx="432" cy="404" r="96" fill="#000000" opacity="0.06"/>
  <!-- Bottom wave (same wave path as all other bots) -->
  <path d="M0 360 C120 320, 220 400, 512 320 L512 512 L0 512 Z" fill="#ffffff" opacity="0.08"/>

  <!-- === ROBOT HEAD (identical geometry across all bots) === -->
  <g filter="url(#softShadow)">
    <!-- Head hexagon body -->
    <path d="M158 150 L354 150 L392 220 L358 350 L154 350 L120 220 Z" fill="url(#armor)"/>
    <!-- Visor: bright accent bar, upper face -->
    <rect x="178" y="172" width="156" height="36" rx="10" fill="#c084fc"/>
    <!-- Mouth plate: dark inset -->
    <rect x="170" y="230" width="172" height="58" rx="12" fill="#0f172a" opacity="0.9"/>
    <!-- Mouth slots (always #93c5fd across all bots — consistent design system) -->
    <rect x="188" y="246" width="58" height="16" rx="8" fill="#93c5fd"/>
    <rect x="266" y="246" width="58" height="16" rx="8" fill="#93c5fd"/>
    <!-- Chin accent -->
    <rect x="224" y="292" width="64" height="12" rx="6" fill="#c084fc"/>
    <!-- Crest: trapezoid above head (same path, filled with p1) -->
    <path d="M188 150 L220 112 L292 112 L324 150 Z" fill="#7c3aed"/>
    <!-- Side pillars: left and right (identical to all other bots) -->
    <rect x="146" y="188" width="24" height="118" rx="10" fill="#312e81"/>
    <rect x="342" y="188" width="24" height="118" rx="10" fill="#312e81"/>
  </g>

  <!-- === BADGE (bottom-right, translate(362,362)) === -->
  <g transform="translate(362,362)">
    <!-- Outer dark ring -->
    <circle cx="56" cy="56" r="56" fill="#0b1220" opacity="0.78"/>
    <!-- Badge fill: accent color -->
    <circle cx="56" cy="56" r="48" fill="#c084fc"/>
    <!-- Badge icon: atom (science / research symbol) -->
    <!-- Nucleus -->
    <circle cx="56" cy="56" r="6" fill="#111827"/>
    <!-- Three orbital ellipses at 0°, 60°, 120° -->
    <ellipse cx="56" cy="56" rx="22" ry="7" fill="none" stroke="#111827" stroke-width="3.5"/>
    <ellipse cx="56" cy="56" rx="22" ry="7" fill="none" stroke="#111827" stroke-width="3.5"
             transform="rotate(60 56 56)"/>
    <ellipse cx="56" cy="56" rx="22" ry="7" fill="none" stroke="#111827" stroke-width="3.5"
             transform="rotate(120 56 56)"/>
  </g>

  <!-- === TEXT (same font and positions as all other bots) === -->
  <text x="256" y="430"
        font-family="Avenir Next, Segoe UI, sans-serif"
        font-size="30" text-anchor="middle" fill="#f8fafc" font-weight="700">Perceptor</text>
  <text x="256" y="460"
        font-family="Avenir Next, Segoe UI, sans-serif"
        font-size="16" text-anchor="middle" fill="#e2e8f0" opacity="0.92">Research Specialist</text>
</svg>
